name: TestFlight

# Builds the iOS app and uploads it to TestFlight on every push to main
# (and on manual dispatch). Signing is fully automatic via an App Store
# Connect API key — no certificates or provisioning profiles are stored in
# the repo; Xcode cloud-manages them.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID        App Store Connect API key ID
#   ASC_ISSUER_ID     App Store Connect API issuer ID
#   ASC_KEY_P8        contents of the AuthKey_XXXX.p8 file (paste as-is)
#   APPLE_TEAM_ID     Apple Developer team ID (e.g. V5XV3994L8)
#
# The app record (bundle id eu.illegible.prosperios) must already exist in
# App Store Connect. The API key needs the "App Manager" role.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    # Apple requires the iOS 26 SDK for App Store uploads → needs Xcode 26,
    # which ships as the default on the macos-26 runner image.
    runs-on: macos-26
    env:
      DERIVED: ${{ github.workspace }}/app/.build-xcode
      ARCHIVE: ${{ github.workspace }}/build/Prosper.xcarchive
      EXPORT: ${{ github.workspace }}/build/export
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Xcode / SDKs
        run: xcodebuild -version && xcodebuild -showsdks | grep -i ios || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # Import a PERSISTED Apple Distribution cert so signing reuses it every run.
      # Without this, -allowProvisioningUpdates mints a NEW cert per CI run (fresh
      # runner = no key in keychain) and quickly hits Apple's certificate cap.
      # Profiles are still created on demand by the API key (they don't count
      # against the cert cap).
      - name: Import signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPASS="$(uuidgen)"
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KPASS" "$KEYCHAIN" >/dev/null
          # Make it visible to xcodebuild alongside the default login keychain.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Generate project
        working-directory: app
        run: xcodegen generate

      - name: Archive
        working-directory: app
        run: |
          xcodebuild archive \
            -project Prosper.xcodeproj -scheme Prosper \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            -derivedDataPath "$DERIVED" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=YES \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -quiet

      - name: Export .ipa
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>export</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath "$EXPORT" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file "$(ls "$EXPORT"/*.ipa)" \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}
