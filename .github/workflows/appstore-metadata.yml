name: App Store metadata

# Uploads App Store metadata + screenshots (no binary) via fastlane deliver.
# Reuses the same App Store Connect API key secrets as the TestFlight workflow.
# Run manually from the Actions tab. Does NOT submit for review.
on:
  workflow_dispatch:

jobs:
  deliver:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Build API key file
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          jq -n \
            --arg kid "$ASC_KEY_ID" \
            --arg iss "$ASC_ISSUER_ID" \
            --arg key "$ASC_KEY_P8" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false, duration:1200}' \
            > "$RUNNER_TEMP/asc_key.json"

      - name: Diagnose ASC app/version state
        run: |
          cat > /tmp/diag.rb <<'RUBY'
          require 'spaceship'
          token = Spaceship::ConnectAPI::Token.from_json_file(ENV['KEY'])
          Spaceship::ConnectAPI.token = token
          app = Spaceship::ConnectAPI::App.find('eu.illegible.prosperios')
          unless app
            puts 'APP: not found for this API key'; exit 0
          end
          puts "APP: id=#{app.id} name=#{app.name}"
          vers = app.get_app_store_versions
          if vers.empty?
            puts 'VERSIONS: none (no editable App Store version exists)'
          else
            vers.each { |v| puts "VER #{v.version_string} state=#{v.app_store_state} platform=#{v.platform}" }
          end
          RUBY
          KEY="$RUNNER_TEMP/asc_key.json" ruby /tmp/diag.rb

      - name: Ensure an editable 0.1 version exists
        run: |
          cat > /tmp/ensure.rb <<'RUBY'
          require 'spaceship'
          token = Spaceship::ConnectAPI::Token.from_json_file(ENV['KEY'])
          Spaceship::ConnectAPI.token = token
          app = Spaceship::ConnectAPI::App.find('eu.illegible.prosperios')
          abort 'APP not found' unless app
          editable = app.get_edit_app_store_version(platform: Spaceship::ConnectAPI::Platform::IOS)
          if editable
            puts "EDITABLE version already present: #{editable.version_string}"
          else
            puts 'Creating editable iOS version 0.1...'
            app.ensure_version!('0.1', platform: Spaceship::ConnectAPI::Platform::IOS)
            puts 'Created 0.1.'
          end
          RUBY
          KEY="$RUNNER_TEMP/asc_key.json" ruby /tmp/ensure.rb

      - name: Upload screenshots
        run: |
          fastlane deliver \
            --api_key_path "$RUNNER_TEMP/asc_key.json" \
            --app_version "0.1" \
            --skip_binary_upload true \
            --skip_metadata true \
            --skip_screenshots false \
            --overwrite_screenshots true \
            --force true \
            --submit_for_review false \
            --precheck_include_in_app_purchases false

      - name: Ensure review-detail record exists (fixes first-version "No data")
        run: |
          cat > /tmp/review.rb <<'RUBY'
          require 'spaceship'
          token = Spaceship::ConnectAPI::Token.from_json_file(ENV['KEY'])
          Spaceship::ConnectAPI.token = token
          app = Spaceship::ConnectAPI::App.find('eu.illegible.prosperios')
          abort 'APP not found' unless app
          v = app.get_edit_app_store_version(platform: Spaceship::ConnectAPI::Platform::IOS)
          abort 'No editable version' unless v
          begin
            v.fetch_app_store_review_detail
            puts 'Review detail already present.'
          rescue => e
            puts "No review detail (#{e.message}) — creating one..."
            Spaceship::ConnectAPI.post_app_store_review_detail(
              app_store_version_id: v.id,
              attributes: {
                contactFirstName: 'Ventsislav',
                contactLastName: 'Georgiev',
                contactPhone: 'REDACTED',
                contactEmail: 'ventsislav.georgiev@yahoo.com',
                demoAccountRequired: false
              }
            )
            puts 'Created review detail.'
          end
          RUBY
          KEY="$RUNNER_TEMP/asc_key.json" ruby /tmp/review.rb

      - name: Upload text metadata
        run: |
          fastlane deliver \
            --api_key_path "$RUNNER_TEMP/asc_key.json" \
            --app_version "0.1" \
            --skip_binary_upload true \
            --skip_metadata false \
            --skip_screenshots true \
            --force true \
            --submit_for_review false \
            --precheck_include_in_app_purchases false
