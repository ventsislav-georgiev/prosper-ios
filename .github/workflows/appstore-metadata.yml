name: App Store metadata

# Uploads App Store metadata + screenshots (no binary) via fastlane deliver.
# Reuses the same App Store Connect API key secrets as the TestFlight workflow.
# Run manually from the Actions tab. Does NOT submit for review.
on:
  workflow_dispatch:

jobs:
  deliver:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Build API key file
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          jq -n \
            --arg kid "$ASC_KEY_ID" \
            --arg iss "$ASC_ISSUER_ID" \
            --arg key "$ASC_KEY_P8" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false, duration:1200}' \
            > "$RUNNER_TEMP/asc_key.json"

      - name: Upload metadata + screenshots
        run: |
          fastlane deliver \
            --api_key_path "$RUNNER_TEMP/asc_key.json" \
            --skip_binary_upload true \
            --overwrite_screenshots true \
            --force true \
            --submit_for_review false \
            --precheck_include_in_app_purchases false
