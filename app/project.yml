name: Prosper
options:
  bundleIdPrefix: eu.illegible
  deploymentTarget:
    iOS: "16.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main
targets:
  Prosper:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.illegible.prosperios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Prosper
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Standard TLS only (no proprietary crypto) → exempt; skips the
        # export-compliance prompt on every TestFlight build.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        # Catalyst gives same-app e2e on the Mac (PLAN §8). Client is connect-only;
        # com.apple.security.network.client (in Prosper.entitlements) lets the
        # Catalyst sandbox reach the Mac (dch over Tailscale) and the account server
        # (auth + remote wake). iOS doesn't sandbox, but the key is harmless there.
        CODE_SIGN_ENTITLEMENTS: Sources/Prosper.entitlements
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        # ponytail: local dev builds run unsigned (no team needed). CI signs for
        # TestFlight via the App Store Connect API key (see .github/workflows).
        CODE_SIGNING_ALLOWED: NO
